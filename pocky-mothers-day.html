<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mother's Day – Pocky</title>

<link rel="stylesheet" href="https://use.typekit.net/wtk0tjv.css">

<style>
:root {
  --font-main: "aptly", sans-serif;
  --pocky-pink: #ed008c;
  --pocky-red: #ed1b24;
  --pocky-yellow: #ffce07;
  --pocky-white: #ffffff;
}

body {
  font-family: var(--font-main);
  background: #f4f4f4;
  margin: 0;
}

/* HEADER */
.top-banner {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 1.5rem 2rem;
}

.top-banner-logo {
  grid-column: 2;
}

.top-banner-logo img {
  width: 220px;
}

.reservations-btn-wrap {
  grid-column: 3;
  display: flex;
  justify-content: flex-end;
}

.reservations-btn {
  background: var(--pocky-red);
  color: white;
  border: none;
  padding: 0.8rem 1.4rem;
  text-transform: uppercase;
  cursor: pointer;
}

/* CONTENT */
.container {
  max-width: 900px;
  margin: 0 auto;
  text-align: center;
  padding: 1rem 1.5rem 3rem;
}

.title img {
  width: 320px;
  max-width: 80%;
  margin: 1rem 0;
}

.subtitle {
  color: var(--pocky-pink);
  font-size: 1.2rem;
  line-height: 1.5;
  margin-bottom: 2rem;
}

/* BOOKING BOX */
.booking-box {
  background: linear-gradient(180deg, #ff008c, #d6006e);
  border-radius: 28px;
  padding: 2rem;
  margin-bottom: 2rem;
}

/* GIFT BUTTON */
.gift-btn {
  display: inline-block;
  background: var(--pocky-pink);
  color: white;
  padding: 0.9rem 1.6rem;
  text-decoration: none;
  text-transform: uppercase;
  font-size: 0.9rem;
  margin-bottom: 2rem;
}

/* PACMAN */
.pacman img {
  width: 140px;
  margin-top: 1rem;
}

/* FOOTER (copied) */
.footer-bar {
  background: var(--pocky-yellow);
  padding: 1rem;
  text-align: center;
  font-size: 0.85rem;
}

/* MOBILE */
@media (max-width: 600px) {
  .subtitle {
    font-size: 1.05rem;
  }

  .booking-box {
    padding: 1.5rem;
  }
}

/* CAMPAIGN NAV */
.campaign-nav {
  display: flex;
  justify-content: center;
  gap: 2rem;
  margin-top: -0.5rem;
  margin-bottom: 1.5rem;
}

.campaign-nav a {
  color: var(--pocky-pink);
  text-decoration: none;
  text-transform: uppercase;
  font-size: 1rem;
  letter-spacing: 0.06em;
}

.campaign-nav a:hover,
.campaign-nav a:focus-visible {
  text-decoration: underline;
}

/* MOBILE NAV */
@media (max-width: 700px) {
  .campaign-nav {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    margin: 0;
  }

  .campaign-nav a {
    color: #ffffff;
    text-align: center;
    padding: 1.2rem 0.5rem;
    font-size: 1rem;
    text-decoration: none;
  }

  .campaign-nav a:nth-child(1) {
    display: none;
  }

  .campaign-nav a:nth-child(2) {
    background: var(--pocky-pink);
  }

  .campaign-nav a:nth-child(3) {
    background: var(--pocky-red);
  }

  .campaign-nav a:nth-child(4) {
    background: var(--pocky-yellow);
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="top-banner">
  <div class="top-banner-logo">
    <img src="https://raw.githubusercontent.com/pockyasianrestaurant/pockyasianrestaurant/d4f4ea10e00dcd6f771204d23ec356be238877cd/pocky-logo-mothersday.svg">
  </div>

  <div class="reservations-btn-wrap">
    <button class="reservations-btn" onclick="openReservationsModal()">Reservations</button>
  </div>
</div>
<nav class="campaign-nav" aria-label="Main navigation">
  <a href="index.html">Home</a>
  <a href="POCKY MENU 28_2_26.pdf" target="_blank" rel="noopener">Menu</a>
  <a href="https://pocky-asian-restaurant.square.site/" target="_blank" rel="noopener">Order</a>
  <a href="https://app.squareup.com/gift/MLVB6NCJR90DD/order" target="_blank" rel="noopener">Gift Cards</a>
</nav>
<!-- CONTENT -->
<div class="container">

  <div class="title">
    <img src="https://raw.githubusercontent.com/pockyasianrestaurant/pockyasianrestaurant/d4f4ea10e00dcd6f771204d23ec356be238877cd/title-mothersday.svg">
  </div>

  <div class="subtitle">
    Book lunch or dinner on Sunday 10 May with Mum and she’ll receive a glass of prosecco (or non-alcoholic beverage) on arrival.
  </div>

  <!-- BOOKING -->
  <div class="booking-box">
    <div
      class="obee-widget"
      account="pockyasianrestaurant"
      hide-header="false"
      min-height="450"
      add-height="50"
      scrolltop="true"
      widget-type="booking">
    </div>
  </div>

  <!-- GIFT -->
  <a class="gift-btn"
     href="https://app.squareup.com/gift/MLVB6NCJR90DD/order"
     target="_blank">
     Give Mum a Pocky Gift Voucher
  </a>

  <!-- PACMAN -->
  <div class="pacman">
    <img src="https://raw.githubusercontent.com/pockyasianrestaurant/pockyasianrestaurant/d4f4ea10e00dcd6f771204d23ec356be238877cd/icon-mother-pacman.svg">
  </div>

</div>

<!-- FOOTER -->
<footer class="footer-bar">
  Shop 1, 4 Maple Street, Maleny |
  Dinner: Wed – Sun, 4:30pm – late |
  Lunch: Fri & Sun, 11:30am – 2:30pm
</footer>

<!-- Obee script -->
<script src="https://bookings.obeeapp.com/iframe.js"></script>

<!-- Reservations modal (reuse from homepage if needed) -->
<script>
function openReservationsModal() {
  window.scrollTo({ top: 300, behavior: 'smooth' });
}
</script>

</body>
</html>
